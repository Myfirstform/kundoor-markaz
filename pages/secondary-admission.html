<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="keywords" content="kundoor markaz, markaz kundoor, secondary admission, islamic college admission">
    <meta name="description" content="Secondary Admission Form - Kundoor Markaz">
    <link rel="icon" href="../pics/markaz web icon.png" type="image/x-icon">
    
    <title>Secondary Admission | Kundoor Markaz</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css">
    <link rel="stylesheet" href="../modern-style.css">
    <link rel="stylesheet" href="../modern-components.css">
    
    <style>
        .iframe-container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
        }
        
        .iframe-header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .iframe-header h1 {
            color: white;
            margin: 0;
            font-size: 1.5rem;
            font-weight: 600;
        }
        
        .back-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 0.5rem 1rem;
            border-radius: var(--radius-md);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
        }
        
        .back-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }
        
        .iframe-wrapper {
            flex: 1;
            padding: 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .admission-iframe {
            width: 100%;
            max-width: 800px;
            height: calc(100vh - 140px);
            border: none;
            border-radius: var(--radius-lg);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            background: white;
        }
        
        @media (max-width: 768px) {
            .iframe-header {
                padding: 1rem;
            }
            
            .iframe-header h1 {
                font-size: 1.2rem;
            }
            
            .back-btn {
                padding: 0.4rem 0.8rem;
                font-size: 0.9rem;
            }
            
            .iframe-wrapper {
                padding: 1rem;
            }
            
            .admission-iframe {
                height: calc(100vh - 120px);
            }
        }
    </style>
</head>
<body>
    <div class="iframe-container">
        <div class="iframe-header">
            <h1><i class="fas fa-school"></i> Secondary Admission Form</h1>
            <a href="./admission.html" class="back-btn">
                <i class="fas fa-arrow-left"></i> Back to Admissions
            </a>
        </div>
        
        <div class="iframe-wrapper">
            <iframe 
                src="https://script.google.com/macros/s/AKfycbzwNrQ5fr1I7dmzEliJlxdl4cpDiVLNmWjqOhWV18ZxmsEoqkh9X-7GkQdnTdF1QDKz4g/exec"
                class="admission-iframe"
                frameborder="0"
                marginheight="0"
                marginwidth="0"
                scrolling="auto">
                Loading...
            </iframe>
        </div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
    <script>AOS.init({ duration: 1000, once: true });</script>
</body>
</html>
